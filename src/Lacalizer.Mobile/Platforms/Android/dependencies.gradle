ext {
    androidxMedia3Version = "1.8.0"
}

configurations.all {
    resolutionStrategy {
        force "androidx.media3:media3-common:$androidxMedia3Version"
        force "androidx.media3:media3-exoplayer:$androidxMedia3Version"
        force "androidx.media3:media3-ui:$androidxMedia3Version"
    }
}
